# Q4 — 多车、含时间窗惩罚+容量约束（50 节点）+ 车辆数敏感性分析
problem: q4
description: "Multi-vehicle, time-window penalty, capacity constraint (50 customers), vehicle sensitivity analysis"

data:
  raw_excel: data/raw/reference_case.xlsx
  processed_dir: data/processed/
  num_customers: 50

solver:
  backend: kaiwu
  time_limit_sec: 600
  seed: 42

# 车辆参数
vehicle:
  capacity: 60              # 单车最大载重
  # 优化模式：weighted(加权目标) | lexicographic(词典序)
  optimization_mode: weighted

# 问题四总目标：alpha*车辆数 + beta*总运输时间 + gamma*时间窗惩罚
objective:
  alpha: 1.0
  beta: 1.0
  gamma: 1.0

# 车辆数敏感性分析范围
sensitivity:
  min_vehicles: 5
  max_vehicles: 10
  step: 1

hybrid:
  cluster_method: kmeans
  n_clusters: 10
  sub_solver: kaiwu
  local_search_iter: 500
  seed: 42

# 导出到真机时的资源上限保护
qubo_export:
  max_parts: 10

sa:
  initial_temp: 5000.0
  cooling_rate: 0.997
  min_temp: 1e-4
  n_iter_per_temp: 500
  seed: 42

kaiwu:
  # 建议通过环境变量注入密钥：KAIWU_USER_ID / KAIWU_SDK_CODE
  user_id: ""
  sdk_code: ""
  num_reads: 300
  annealing_time: 60

time_window:
  alpha: 10
  beta: 20

qubo:
  penalty_visit: 500
  penalty_position: 500
  penalty_tw: 100
  penalty_capacity: 500

output:
  log_dir: outputs/logs/
  figure_dir: outputs/figures/
  result_dir: outputs/results/
  qubo_dir: outputs/qubo_ising/
  prescreen_dir: outputs/prescreen/
  log_level: INFO
