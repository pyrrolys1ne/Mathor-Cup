# Q1 — 单车、无时间窗、无容量（15 节点）
problem: q1
description: "Single vehicle, no time windows, no capacity constraint (15 customers)"

# 数据路径
data:
  raw_excel: data/raw/reference_case.xlsx
  processed_dir: data/processed/
  num_customers: 15          # 不含配送中心（ID=0）

# 求解器配置
solver:
  backend: kaiwu              # sa | kaiwu
  time_limit_sec: 60
  seed: 42

# 模拟退火超参
sa:
  initial_temp: 1000.0
  cooling_rate: 0.995
  min_temp: 1e-4
  n_iter_per_temp: 200
  seed: 42

# Kaiwu SDK 超参（backend=kaiwu 时生效）
kaiwu:
  # 建议通过环境变量注入密钥：KAIWU_USER_ID / KAIWU_SDK_CODE
  user_id: ""
  sdk_code: ""
  num_reads: 300             # 采样预算（越大越稳，越慢）
  annealing_time: 60         # 退火强度（越大通常质量越好）
  n_runs: 5                  # 多次独立采样，主程序会自动取最优
  postprocess_two_opt: true  # Kaiwu 路线后执行 2-opt 精修
  seed: 42                   # 基准种子（每轮会自动偏移）
  quiet: true                # 减少 Kaiwu 内部日志

# QUBO 惩罚系数
qubo:
  penalty_visit: 300         # 每个节点恰好访问一次
  penalty_position: 300      # 每个位置恰好一辆车

# 输出
output:
  log_dir: outputs/logs/
  figure_dir: outputs/figures/
  table_dir: outputs/tables/
  log_level: INFO
